name: EGX Daily Technical Analysis Report

on:
  schedule:
    - cron: "0 7 * * 0-4"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: egx-daily-report
  cancel-in-progress: false

jobs:
  send-report:
    name: Scan All EGX Stocks & Send Technical Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan all EGX stocks and send technical analysis report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py --scheduled
        timeout-minutes: 25

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3.8.0
        with:
          server-address: smtp.gmail.com
          server-port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "❌ EGX Bot — Workflow Failed"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: EGX Bot
          body: |
            The EGX Daily Technical Analysis workflow has failed.
            Check the logs at:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
