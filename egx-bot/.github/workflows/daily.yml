name: EGX Daily Technical Analysis Report

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: egx-daily-report
  cancel-in-progress: false

jobs:
  send-report:
    name: EGX Daily Report — Scan & Send to Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: TEMPORARY TEST — deliberate failure
        run: |
          echo "🧪 TEST: Deliberate failure for monitoring system test"
          exit 1
