name: EGX Daily Technical Analysis Report

on:
  # Runs at 9:00 AM Cairo time (UTC+2, year-round — Egypt cancelled DST in 2024)
  # 9:00 AM Cairo = 7:00 AM UTC
  # Sunday–Thursday = EGX trading days (cron: 0=Sunday in GitHub Actions)
  schedule:
    - cron: "0 7 * * 0-4"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-report:
    name: Scan All EGX Stocks & Send Technical Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan all EGX stocks and send technical analysis report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py --scheduled
