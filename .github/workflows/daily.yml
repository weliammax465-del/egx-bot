name: EGX Daily Technical Analysis Report

on:
  schedule:
    # 7:00 AM UTC = 9:00 AM Cairo (Africa/Cairo, UTC+2)
    # Runs every day — bot code skips non-trading days (Fri/Sat)
    - cron: "0 7 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  # Prevent duplicate runs — if a new run starts, the old one continues
  group: egx-daily-report
  cancel-in-progress: false

jobs:
  send-report:
    name: EGX Daily Report — Scan & Send to Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Get today's date (UTC)
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # ── Duplicate Prevention ──────────────────────────────────────
      # Cache key is date-based: if today's report was already sent,
      # the cache hit skips all subsequent steps.
      - name: Check if report already sent today
        id: check-sent
        uses: actions/cache@v4.2.0
        with:
          path: egx-bot/.egx_sent_today
          key: egx-report-${{ steps.date.outputs.today }}
        continue-on-error: true

      - name: Set up Python 3.11
        if: steps.check-sent.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        if: steps.check-sent.outputs.cache-hit != 'true'
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('egx-bot/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: steps.check-sent.outputs.cache-hit != 'true'
        run: pip install -r egx-bot/requirements.txt

      # ── Send Report with Automatic Retry ──────────────────────────
      # 3 attempts with 60s wait between each.
      # The bot code also has internal retry (3x with 30s backoff),
      # so total max attempts = 3 workflow × 3 bot = 9 tries.
      - name: Send daily report (with automatic retry)
        if: steps.check-sent.outputs.cache-hit != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== EGX Daily Report — $(date -u) ==="
          for attempt in 1 2 3; do
            echo ""
            echo "─── Workflow attempt $attempt of 3 ───"
            python egx-bot/bot.py --scheduled && {
              echo "✅ Report sent successfully on attempt $attempt"
              exit 0
            }
            echo "❌ Attempt $attempt failed (exit code $?)"
            if [ $attempt -lt 3 ]; then
              echo "⏳ Waiting 60 seconds before retry..."
              sleep 60
            fi
          done
          echo "❌ All 3 workflow attempts failed"
          exit 1
        timeout-minutes: 25

      # ── Save Recommendations JSON ─────────────────────────────────
      # Commit the recommendations JSON file for performance tracking.
      # A Base44 automation reads this file to save recommendations
      # to the RecommendationHistory entity and evaluate past ones.
      - name: Commit recommendations JSON
        if: success() && steps.check-sent.outputs.cache-hit != 'true'
        run: |
          git config user.name "EGX Bot"
          git config user.email "bot@egx-bot.local"
          # Check if there are any changes (recommendations JSON file)
          if [ -n "$(git status --porcelain egx-bot/data/recommendations_*.json)" ]; then
            git add egx-bot/data/recommendations_*.json
            git commit -m "📊 Recommendations for ${{ steps.date.outputs.today }}"
            git push
            echo "✅ Recommendations JSON committed"
          else
            echo "ℹ️ No recommendations JSON to commit"
          fi
        continue-on-error: true

      # ── Telegram Failure Notification ─────────────────────────────
      # Replaces the old SMTP email notification (which was never configured).
      # Sends a direct Telegram message if ALL retry attempts failed.
      - name: Notify on Telegram failure
        if: failure() && steps.check-sent.outputs.cache-hit != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ EGX Bot — فشل التقرير اليومي بعد 3 محاولات

التاريخ: ${{ steps.date.outputs.today }}
التفاصيل: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

تحقق من:
• صلاحية Telegram Bot Token
• صلاحية Gemini API Key
• مصادر البيانات (TradingView/stockanalysis.com)

نظام المراقبة Base44 ستحاول إعادة التشغيل تلقائياً خلال 15 دقيقة."

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            > /dev/null 2>&1 || true
        continue-on-error: true
